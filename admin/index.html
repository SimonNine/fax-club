<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fax Club // Admin Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0E0E0D;
      --surface: #161615;
      --surface-2: #1E1E1C;
      --border: rgba(255,255,255,0.06);
      --border-active: rgba(255,255,255,0.12);
      --text: #E8E3D8;
      --text-muted: rgba(232,227,216,0.4);
      --accent: #B5541E;
      --accent-hover: #CC6633;
      --green: #4CAF50;
      --yellow: #E8B730;
      --red: #CF4444;
      --mono: 'Space Mono', monospace;
    }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 0.8rem;
    }

    /* ==================== LOGIN ==================== */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .login-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255,255,255,0.008) 1px, rgba(255,255,255,0.008) 2px);
      pointer-events: none;
    }

    .login-box {
      width: 360px;
      max-width: 90vw;
      padding: 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .login-box h1 {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    .login-box .login-sub {
      font-size: 0.55rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }

    .login-box label {
      display: block;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .login-box input {
      width: 100%;
      padding: 0.7rem 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.75rem;
      outline: none;
      margin-bottom: 1.2rem;
      transition: border-color 0.2s;
    }

    .login-box input:focus { border-color: var(--accent); }

    .login-error {
      font-size: 0.6rem;
      color: var(--red);
      margin-bottom: 1rem;
      display: none;
    }

    .login-error.show { display: block; }

    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-btn:hover { background: var(--accent-hover); }

    /* ==================== ADMIN SHELL ==================== */
    .admin { display: none; min-height: 100vh; }
    .admin.active { display: flex; flex-direction: column; }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .admin-header-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .admin-logo {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .admin-badge {
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0.25rem 0.6rem;
      border: 1px solid var(--border);
    }

    .admin-header-right { display: flex; gap: 1rem; align-items: center; }

    .btn {
      padding: 0.5rem 1rem;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-accent { background: var(--accent); color: var(--bg); }
    .btn-accent:hover { background: var(--accent-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { border-color: var(--text); color: var(--text); }

    .btn-danger { background: var(--red); color: white; }
    .btn-danger:hover { background: #B83A3A; }

    /* ==================== TABLE ==================== */
    .admin-body { flex: 1; padding: 2rem; max-width: 1100px; width: 100%; margin: 0 auto; }

    .admin-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .admin-toolbar h2 {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .admin-count {
      font-size: 0.55rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 0.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    th:hover { color: var(--text); }

    td {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      vertical-align: top;
    }

    tr:hover { background: var(--surface-2); }

    tr.draft td { opacity: 0.5; }

    .status-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid;
    }

    .status-published { color: var(--green); border-color: rgba(76,175,80,0.3); }
    .status-draft { color: var(--yellow); border-color: rgba(232,183,48,0.3); }

    .td-quote {
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .td-actions { white-space: nowrap; }

    .td-actions button {
      padding: 0.3rem 0.6rem;
      font-family: var(--mono);
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      margin-right: 0.3rem;
    }

    .td-actions button:hover { color: var(--text); border-color: var(--text); }
    .td-actions button.del:hover { color: var(--red); border-color: var(--red); }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
    }

    /* ==================== MODAL ==================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      width: 500px;
      max-width: 92vw;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
    }

    .modal h3 {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    .field { margin-bottom: 1.2rem; }

    .field label {
      display: block;
      font-size: 0.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.7rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus { border-color: var(--accent); }

    .field textarea { resize: vertical; min-height: 100px; line-height: 1.6; }

    .field select { cursor: pointer; }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    /* ==================== CONFIRM DIALOG ==================== */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .confirm-overlay.open { display: flex; }

    .confirm-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
      width: 380px;
      max-width: 90vw;
      text-align: center;
    }

    .confirm-box p {
      font-size: 0.7rem;
      margin-bottom: 1.5rem;
      line-height: 1.6;
      color: var(--text);
    }

    .confirm-actions { display: flex; gap: 0.5rem; justify-content: center; }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 768px) {
      .admin-body { padding: 1rem; }
      .admin-header { padding: 0.8rem 1rem; }
      td, th { padding: 0.6rem 0.5rem; font-size: 0.6rem; }
      .td-quote { max-width: 180px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>Fax Club</h1>
      <div class="login-sub">Admin Console // Secure Access</div>
      <label for="pw">Password</label>
      <input type="password" id="pw" placeholder="Enter access code" autofocus>
      <div class="login-error" id="loginError">ACCESS DENIED — Invalid credentials</div>
      <button class="login-btn" id="loginBtn">Authenticate</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div class="admin" id="adminPanel">
    <header class="admin-header">
      <div class="admin-header-left">
        <div class="admin-logo">Fax Club</div>
        <div class="admin-badge">Admin Console</div>
      </div>
      <div class="admin-header-right">
        <span class="admin-count" id="countLabel"></span>
        <button class="btn btn-accent" id="addBtn">+ New Testimonial</button>
        <button class="btn btn-ghost" id="logoutBtn">Logout</button>
      </div>
    </header>

    <div class="admin-body">
      <div class="admin-toolbar">
        <h2>Testimonials</h2>
      </div>

      <table id="testimonialTable">
        <thead>
          <tr>
            <th data-sort="quote">Quote</th>
            <th data-sort="author">Author</th>
            <th data-sort="status">Status</th>
            <th data-sort="created">Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

      <div class="empty-state" id="emptyState" style="display:none;">No testimonials yet. Add your first one.</div>
    </div>
  </div>

  <!-- EDIT/ADD MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">New Testimonial</h3>
      <div class="field">
        <label for="editQuote">Quote</label>
        <textarea id="editQuote" placeholder="Enter the testimonial text..."></textarea>
      </div>
      <div class="field">
        <label for="editAuthor">Author</label>
        <input type="text" id="editAuthor" placeholder="Name or identifier">
      </div>
      <div class="field">
        <label for="editStatus">Status</label>
        <select id="editStatus">
          <option value="draft">Draft</option>
          <option value="published">Published</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modalCancel">Cancel</button>
        <button class="btn btn-accent" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM DIALOG -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <p id="confirmMsg">You have unsaved changes.</p>
      <div class="confirm-actions">
        <button class="btn btn-ghost" id="confirmDiscard">Discard Changes</button>
        <button class="btn btn-accent" id="confirmSave">Save & Close</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== DATA LAYER ====================
    const STORAGE_KEY = 'faxclub-testimonials';

    // Default testimonials (seed data matching homepage)
    const DEFAULTS = [
      { id: '1', quote: 'Thought-provoking, challenges your values, difficult to put down. This isn\'t just a book \u2014 it\'s a mirror.', author: 'Kindle Customer', status: 'published', created: '2025-12-01T10:00:00Z', updated: '2025-12-01T10:00:00Z' },
      { id: '2', quote: 'Outstanding idea. Brilliant thought provoking read. The kind of thing the world needs more of right now.', author: 'Rob Robson', status: 'published', created: '2025-12-05T14:30:00Z', updated: '2025-12-05T14:30:00Z' },
      { id: '3', quote: 'Fun and inspiring. Easy to pick up. Easy to love. Hard to forget.', author: 'Girl with a Book', status: 'published', created: '2025-12-10T09:15:00Z', updated: '2025-12-10T09:15:00Z' },
      { id: '4', quote: 'Essential reading for anyone in a position of influence. If you lead people, read this.', author: 'Tom Kingsley', status: 'published', created: '2025-12-18T16:00:00Z', updated: '2025-12-18T16:00:00Z' },
      { id: '5', quote: '32 voices thinking aloud \u2014 non-polished, non-filtered. Refreshingly real in a world of hot takes.', author: 'Amazon Customer', status: 'published', created: '2026-01-03T11:45:00Z', updated: '2026-01-03T11:45:00Z' },
    ];

    function loadTestimonials() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULTS));
        return [...DEFAULTS];
      }
      return JSON.parse(raw);
    }

    function saveTestimonials(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    // ==================== AUTH ====================
    const PASSWORD = 'the32!';
    const loginScreen = document.getElementById('loginScreen');
    const adminPanel = document.getElementById('adminPanel');
    const loginError = document.getElementById('loginError');
    const pwInput = document.getElementById('pw');

    function tryLogin() {
      if (pwInput.value === PASSWORD) {
        loginScreen.style.display = 'none';
        adminPanel.classList.add('active');
        sessionStorage.setItem('faxclub-auth', '1');
        renderTable();
      } else {
        loginError.classList.add('show');
        pwInput.value = '';
        pwInput.focus();
        setTimeout(() => loginError.classList.remove('show'), 2000);
      }
    }

    document.getElementById('loginBtn').addEventListener('click', tryLogin);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('faxclub-auth');
      location.reload();
    });

    // Auto-login if session active
    if (sessionStorage.getItem('faxclub-auth')) {
      loginScreen.style.display = 'none';
      adminPanel.classList.add('active');
      renderTable();
    }

    // ==================== TABLE RENDERING ====================
    const tableBody = document.getElementById('tableBody');
    const emptyState = document.getElementById('emptyState');
    const countLabel = document.getElementById('countLabel');
    let sortField = 'created';
    let sortDir = -1; // -1 = newest first

    function renderTable() {
      const data = loadTestimonials();
      const sorted = [...data].sort((a, b) => {
        let va = a[sortField] || '';
        let vb = b[sortField] || '';
        if (sortField === 'created' || sortField === 'updated') {
          va = new Date(va).getTime();
          vb = new Date(vb).getTime();
        }
        if (va < vb) return -1 * sortDir;
        if (va > vb) return 1 * sortDir;
        return 0;
      });

      const published = data.filter(t => t.status === 'published').length;
      const drafts = data.filter(t => t.status === 'draft').length;
      countLabel.textContent = `${published} published / ${drafts} drafts`;

      if (sorted.length === 0) {
        tableBody.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      tableBody.innerHTML = sorted.map(t => `
        <tr class="${t.status === 'draft' ? 'draft' : ''}">
          <td class="td-quote" title="${t.quote.replace(/"/g, '&quot;')}">"${t.quote}"</td>
          <td>${t.author}</td>
          <td><span class="status-badge status-${t.status}">${t.status}</span></td>
          <td>${new Date(t.created).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })}</td>
          <td class="td-actions">
            <button onclick="editTestimonial('${t.id}')">Edit</button>
            <button class="del" onclick="deleteTestimonial('${t.id}')">Del</button>
          </td>
        </tr>
      `).join('');
    }

    // Sorting
    document.querySelectorAll('th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const field = th.dataset.sort;
        if (sortField === field) { sortDir *= -1; }
        else { sortField = field; sortDir = field === 'created' ? -1 : 1; }
        renderTable();
      });
    });

    // ==================== MODAL ====================
    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const editQuote = document.getElementById('editQuote');
    const editAuthor = document.getElementById('editAuthor');
    const editStatus = document.getElementById('editStatus');
    let editingId = null;
    let originalValues = {};

    function openModal(testimonial) {
      if (testimonial) {
        editingId = testimonial.id;
        modalTitle.textContent = 'Edit Testimonial';
        editQuote.value = testimonial.quote;
        editAuthor.value = testimonial.author;
        editStatus.value = testimonial.status;
      } else {
        editingId = null;
        modalTitle.textContent = 'New Testimonial';
        editQuote.value = '';
        editAuthor.value = '';
        editStatus.value = 'draft';
      }
      originalValues = { quote: editQuote.value, author: editAuthor.value, status: editStatus.value };
      modalOverlay.classList.add('open');
      editQuote.focus();
    }

    function hasChanges() {
      return editQuote.value !== originalValues.quote ||
             editAuthor.value !== originalValues.author ||
             editStatus.value !== originalValues.status;
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      editingId = null;
    }

    function saveModal() {
      const quote = editQuote.value.trim();
      const author = editAuthor.value.trim();
      if (!quote || !author) return;

      const data = loadTestimonials();
      const now = new Date().toISOString();

      if (editingId) {
        const idx = data.findIndex(t => t.id === editingId);
        if (idx !== -1) {
          data[idx].quote = quote;
          data[idx].author = author;
          data[idx].status = editStatus.value;
          data[idx].updated = now;
        }
      } else {
        data.push({
          id: genId(),
          quote,
          author,
          status: editStatus.value,
          created: now,
          updated: now,
        });
      }

      saveTestimonials(data);
      closeModal();
      renderTable();
    }

    document.getElementById('addBtn').addEventListener('click', () => openModal(null));
    document.getElementById('modalSave').addEventListener('click', saveModal);

    // Cancel with unsaved changes warning
    document.getElementById('modalCancel').addEventListener('click', () => {
      if (hasChanges()) {
        showConfirm();
      } else {
        closeModal();
      }
    });

    // Close on overlay click
    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) {
        if (hasChanges()) showConfirm();
        else closeModal();
      }
    });

    // Escape key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (confirmOverlay.classList.contains('open')) {
          confirmOverlay.classList.remove('open');
        } else if (modalOverlay.classList.contains('open')) {
          if (hasChanges()) showConfirm();
          else closeModal();
        }
      }
    });

    // ==================== CONFIRM DIALOG ====================
    const confirmOverlay = document.getElementById('confirmOverlay');

    function showConfirm() {
      confirmOverlay.classList.add('open');
    }

    document.getElementById('confirmDiscard').addEventListener('click', () => {
      confirmOverlay.classList.remove('open');
      closeModal();
    });

    document.getElementById('confirmSave').addEventListener('click', () => {
      confirmOverlay.classList.remove('open');
      saveModal();
    });

    // ==================== EDIT / DELETE ====================
    window.editTestimonial = function(id) {
      const data = loadTestimonials();
      const t = data.find(x => x.id === id);
      if (t) openModal(t);
    };

    window.deleteTestimonial = function(id) {
      if (!confirm('Delete this testimonial?')) return;
      const data = loadTestimonials().filter(t => t.id !== id);
      saveTestimonials(data);
      renderTable();
    };
  </script>
</body>
</html>
